version: '3.8'

x-server-template: &server_template
  build: .
  privileged: true

services:
  ubuntu-server-first:
    <<: *server_template
    container_name: ansible-node-1
    ports:
      - "2221:22"   # SSH
      - "8081:80"   # Nginx
      - "7681:7681" # Веб-терминал

  ubuntu-server-second:
    <<: *server_template
    container_name: ansible-node-2
    
    ports:
      - "2222:22"
      - "8082:80"
      - "7682:7681" # Веб-терминал

  ubuntu-server-three:
    <<: *server_template
    container_name: ansible-node-3
    ports:
      - "2223:22"
      - "8083:80"
      - "7683:7681" # Веб-терминал

  nginx-proxy:
    image: nginx:alpine
    container_name: ansible-proxy
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ubuntu-server-first 
      - ubuntu-server-second
      - ubuntu-server-three
    network_mode: "host"